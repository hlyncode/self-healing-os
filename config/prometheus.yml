global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'self-healing-os'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'

  - job_name: 'self-healing-os'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'self-healing-os'
          component: 'metrics'
